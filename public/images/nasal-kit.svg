<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sprayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9ead;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7e8d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="268" rx="55" ry="8" fill="rgba(74,158,173,0.08)" />
  <!-- Bottle 1 (center, front) -->
  <rect x="72" y="90" width="56" height="160" rx="8" fill="url(#nkGrad)" stroke="#2a3a4a" stroke-width="1.5"/>
  <rect x="82" y="70" width="36" height="24" rx="3" fill="#3a4a5a"/>
  <!-- Spray nozzle -->
  <rect x="94" y="50" width="12" height="24" rx="6" fill="url(#sprayGrad)"/>
  <ellipse cx="100" cy="50" rx="8" ry="4" fill="url(#sprayGrad)"/>
  <!-- Bottle highlight -->
  <rect x="78" y="96" width="8" height="140" rx="4" fill="rgba(255,255,255,0.04)"/>
  <!-- Label -->
  <rect x="80" y="140" width="40" height="30" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(74,158,173,0.2)" stroke-width="0.5"/>
  <line x1="86" y1="152" x2="114" y2="152" stroke="rgba(74,158,173,0.3)" stroke-width="0.5"/>
  <line x1="88" y1="160" x2="112" y2="160" stroke="rgba(74,158,173,0.2)" stroke-width="0.5"/>
  <!-- Bottle 2 (left, behind) -->
  <rect x="38" y="100" width="44" height="140" rx="7" fill="#141e28" stroke="#222e3a" stroke-width="1" opacity="0.5"/>
  <rect x="48" y="82" width="28" height="20" rx="3" fill="#2a3a4a" opacity="0.5"/>
  <!-- Bottle 3 (right, behind) -->
  <rect x="118" y="100" width="44" height="140" rx="7" fill="#141e28" stroke="#222e3a" stroke-width="1" opacity="0.5"/>
  <rect x="126" y="82" width="28" height="20" rx="3" fill="#2a3a4a" opacity="0.5"/>
  <!-- x3 badge -->
  <circle cx="155" cy="90" r="14" fill="var(--accent, #4a9ead)" opacity="0.9"/>
  <text x="155" y="94" text-anchor="middle" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif">x3</text>
</svg>
