<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="ac2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5bbfcf"/>
      <stop offset="100%" style="stop-color:#3a8e9d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg2)"/>
  <rect x="80" y="80" width="60" height="3" fill="url(#ac2)"/>
  <!-- Hook number -->
  <text x="540" y="200" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="200" fill="url(#ac2)" opacity="0.15">100+</text>
  <!-- Hook -->
  <text x="540" y="340" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#f0f0f5">Den mest studerade</text>
  <text x="540" y="420" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#f0f0f5">peptiden i världen</text>
  <text x="540" y="500" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#f0f0f5">har</text>
  <text x="540" y="580" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="url(#ac2)">100+ studier.</text>
  <!-- Info -->
  <text x="540" y="690" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="34" fill="#8a8a9a">BPC-157. Forskad för återhämtning</text>
  <text x="540" y="740" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="34" fill="#8a8a9a">och tarmfunktion i prekliniska studier.</text>
  <!-- CTA -->
  <rect x="340" y="810" width="400" height="64" rx="32" fill="url(#ac2)"/>
  <text x="540" y="852" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="26" fill="#fff">Spara inlägget för senare</text>
  <!-- Footer -->
  <rect x="0" y="970" width="1080" height="110" fill="#0d1520"/>
  <text x="540" y="1040" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="30" fill="#5bbfcf">scandipep.se</text>
</svg>
