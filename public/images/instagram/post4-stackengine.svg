    </linearGradient>
    <linearGradient id="ac4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5bbfcf"/>
      <stop offset="100%" style="stop-color:#3a8e9d"/>
