  </defs>
  <rect width="1080" height="1080" fill="url(#bg4)"/>
  <rect x="80" y="80" width="60" height="3" fill="url(#ac4)"/>
  <!-- Hook -->
  <text x="540" y="200" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="28" fill="#5bbfcf" letter-spacing="4">QUIZ</text>
  <text x="540" y="330" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#f0f0f5">Vilken peptid</text>
  <text x="540" y="420" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#f0f0f5">passar ditt</text>
  <text x="540" y="510" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="url(#ac4)">forskningsområde?</text>
