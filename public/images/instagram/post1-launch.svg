<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="ac1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5bbfcf"/>
      <stop offset="100%" style="stop-color:#3a8e9d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg1)"/>
  <rect x="80" y="80" width="60" height="3" fill="url(#ac1)"/>
  <!-- Hook -->
  <text x="540" y="240" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#f0f0f5">Svenskar beställer</text>
  <text x="540" y="330" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#f0f0f5">peptider från</text>
  <text x="540" y="420" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#f0f0f5">utlandet.</text>
  <!-- Punch -->
  <text x="540" y="550" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="url(#ac1)">Tills nu.</text>
  <!-- Divider -->
  <rect x="440" y="600" width="200" height="2" fill="#2a3a4a"/>
  <!-- Description -->
  <text x="540" y="690" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="34" fill="#8a8a9a">Sveriges första dedikerade peptidbutik.</text>
  <text x="540" y="740" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="34" fill="#8a8a9a">≥98% renhet. Analysbevis. Svensk leverans.</text>
  <!-- Logo -->
  <text x="540" y="880" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="url(#ac1)">SP</text>
  <!-- Footer -->
  <rect x="0" y="970" width="1080" height="110" fill="#0d1520"/>
  <text x="540" y="1040" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="30" fill="#5bbfcf">scandipep.se — Följ oss för lansering</text>
</svg>
