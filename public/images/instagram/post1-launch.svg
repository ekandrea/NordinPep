<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5bbfcf"/>
      <stop offset="100%" style="stop-color:#3a8e9d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Top line -->
  <rect x="80" y="80" width="60" height="3" fill="url(#accent)"/>
  <!-- Logo -->
  <text x="540" y="380" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="160" fill="url(#accent)">SP</text>
  <!-- Brand name -->
  <text x="540" y="500" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="72" fill="#f0f0f5" letter-spacing="4">ScandiPep</text>
  <!-- Tagline -->
  <text x="540" y="600" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="36" fill="#8a8a9a">Forskningspeptider från Skandinavien</text>
  <!-- Divider -->
  <rect x="460" y="660" width="160" height="2" fill="#2a3a4a"/>
  <!-- Coming soon -->
  <text x="540" y="740" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="32" fill="url(#accent)">KOMMER SNART</text>
  <!-- Bottom badges -->
  <text x="540" y="900" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="24" fill="#5a6a7a">≥98% Renhet · COA-Verifierad · Fri Frakt 500kr+</text>
  <!-- Bottom line -->
  <rect x="940" y="997" width="60" height="3" fill="url(#accent)"/>
</svg>
