<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab4c4;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4a9ead;stop-opacity:0.08" />
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="268" rx="50" ry="8" fill="rgba(74,158,173,0.08)" />
  <!-- Wider vial body -->
  <rect x="50" y="55" width="100" height="200" rx="12" fill="url(#bwGrad)" stroke="#2a3a4a" stroke-width="1.5"/>
  <rect x="58" y="63" width="14" height="180" rx="7" fill="rgba(255,255,255,0.04)"/>
  <!-- Water fill (nearly full) -->
  <rect x="54" y="80" width="92" height="171" rx="10" fill="url(#waterGrad)"/>
  <!-- Cap -->
  <rect x="70" y="35" width="60" height="24" rx="4" fill="#5a6a7a"/>
  <rect x="66" y="51" width="68" height="8" rx="2" fill="#2a3a4a"/>
  <!-- Label -->
  <rect x="62" y="120" width="76" height="50" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(106,180,196,0.2)" stroke-width="0.5"/>
  <text x="100" y="142" text-anchor="middle" fill="rgba(106,180,196,0.4)" font-size="8" font-family="sans-serif">BAC</text>
  <text x="100" y="156" text-anchor="middle" fill="rgba(106,180,196,0.3)" font-size="6" font-family="sans-serif">WATER 10ml</text>
  <!-- Volume markers -->
  <line x1="142" y1="100" x2="148" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="142" y1="140" x2="148" y2="140" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="142" y1="180" x2="148" y2="180" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="142" y1="220" x2="148" y2="220" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
</svg>
