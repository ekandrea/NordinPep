<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9ead;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a9ead;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9ead;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7e8d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="100" cy="268" rx="50" ry="8" fill="rgba(74,158,173,0.08)" />
  <!-- Vial body -->
  <rect x="60" y="60" width="80" height="190" rx="10" fill="url(#vialGrad)" stroke="#2a3a4a" stroke-width="1.5"/>
  <!-- Glass highlight -->
  <rect x="68" y="68" width="12" height="170" rx="6" fill="rgba(255,255,255,0.04)"/>
  <!-- Liquid fill -->
  <rect x="64" y="150" width="72" height="96" rx="8" fill="url(#liquidGrad)"/>
  <!-- Cap -->
  <rect x="72" y="40" width="56" height="24" rx="4" fill="url(#capGrad)"/>
  <!-- Cap ring -->
  <rect x="68" y="56" width="64" height="8" rx="2" fill="#2a3a4a"/>
  <!-- Label area -->
  <rect x="72" y="100" width="56" height="40" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(74,158,173,0.2)" stroke-width="0.5"/>
  <line x1="80" y1="112" x2="120" y2="112" stroke="rgba(74,158,173,0.3)" stroke-width="1"/>
  <line x1="84" y1="120" x2="116" y2="120" stroke="rgba(74,158,173,0.2)" stroke-width="0.5"/>
  <line x1="86" y1="128" x2="114" y2="128" stroke="rgba(74,158,173,0.2)" stroke-width="0.5"/>
</svg>
